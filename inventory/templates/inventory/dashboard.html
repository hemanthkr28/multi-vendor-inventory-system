{% load static %}
<!doctype html>
<html>
<head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">📊 Inventory Dashboard</h1>

    <div class="row text-center">

        <!-- Total Products -->
        <div class="col-md-3">
            <div class="card shadow p-3 mb-4 bg-white rounded">
                <h5>Total Products</h5>
                <h2>{{ total_products }}</h2>
            </div>
        </div>

        <!-- Total Vendors -->
        <div class="col-md-3">
            <div class="card shadow p-3 mb-4 bg-white rounded">
                <h5>Total Vendors</h5>
                <h2>{{ total_vendors }}</h2>
            </div>
        </div>

        <!-- Total Stock -->
        <div class="col-md-3">
            <div class="card shadow p-3 mb-4 bg-white rounded">
                <h5>Total Stock</h5>
                <h2>{{ total_stock }}</h2>
            </div>
        </div>

        <!-- Low Stock -->
        <div class="col-md-3">
            <div class="card shadow p-3 mb-4 bg-white rounded border-danger">
                <h5 class="text-danger">Low Stock</h5>
                <h2 class="text-danger">{{ low_stock }}</h2>
            </div>
        </div>

    </div>

    <!-- Navigation Buttons -->
    <div class="text-center mt-4">
        <a href="/api/sync/" class="btn btn-primary">🔄 Sync Data</a>
        <a href="/products/" class="btn btn-success">📦 View Products</a>
    </div>

</div>

</body>
</html>
